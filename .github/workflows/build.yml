- name: Build APK
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          export PYTHONPATH=""
          yes | buildozer android debug 2>&1 | tee build.log
          
          echo "=== APK Search Results ==="
          find . -name "*.apk" -o -name "*.aab" | head -10 || echo "No APK/AAB found"
          
          # Fail the job if no APK was built
          if [ ! -f bin/*.apk ]; then
            echo "❌ ERROR: No APK was generated in bin/ directory!"
            ls -la bin/ || true
            exit 1
          fi
          echo "✅ APK found: $(ls bin/*.apk)"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NetScanPro-APK
          path: bin/*.apk
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
